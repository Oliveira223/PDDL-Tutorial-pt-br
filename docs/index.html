<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDDL Tutorial - Aulas</title>
    <meta name="description" content="Tutorial de PDDL em formato de aulas com sumario lateral e navegacao didatica." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <button id="menu-toggle" class="menu-toggle" aria-label="Alternar menu lateral" title="Abrir ou fechar menu">☰</button>
      <h1 id="top-lesson-title" class="top-lesson-title">Carregando aula...</h1>
    </header>

    <div class="layout">
      <aside id="sidebar" class="sidebar" aria-label="Sumario de aulas">
        <div class="sidebar-inner">
          <h2>Sumario</h2>
          <p class="sidebar-note">Cada nota foi convertida em uma aula. Selecione por modulo.</p>
          <nav id="lesson-nav"></nav>
        </div>
      </aside>

      <main class="content">
        <section class="lesson-header">
          <p id="breadcrumb" class="breadcrumb"></p>
          <div class="lesson-actions">
            <button id="prev-lesson" class="ghost-btn">Aula anterior</button>
            <button id="next-lesson" class="ghost-btn">Proxima aula</button>
          </div>
        </section>

        <article id="lesson-content" class="lesson-content"></article>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
